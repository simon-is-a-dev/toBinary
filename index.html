<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Converter</title>
    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
        }

        .label {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #444444;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 16px;
            font-weight: normal;
            color: #222;
            margin-bottom: 28px;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        input[type="number"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #ccc;
            color: #222;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(28px, 8vw, 36px);
            padding: 8px 0;
            outline: none;
            margin-bottom: 28px;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="number"]:focus {
            border-bottom-color: #222;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        button {
            background: #222;
            border: none;
            color: #f5f0e8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            letter-spacing: 3px;
            padding: 16px 28px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
            width: 100%;
            /* Prevents double-tap zoom on mobile */
            touch-action: manipulation;
        }

        @media (min-width: 480px) {
            button {
                width: auto;
            }
        }

        button:hover { opacity: 0.7; }
        button:active { opacity: 0.5; }

        .divider {
            border: none;
            border-top: 1px solid #ddd;
            margin: 28px 0;
        }

        .output-label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #212121;
            margin-bottom: 12px;
        }

        #output {
            font-size: clamp(18px, 5vw, 24px);
            color: #222;
            letter-spacing: 2px;
            word-break: break-all;
            line-height: 1.8;
            min-height: 32px;
        }

        /* Safe area insets for notched phones */
        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: calc(24px + env(safe-area-inset-bottom));
                padding-left: calc(20px + env(safe-area-inset-left));
                padding-right: calc(20px + env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">Converter / 001</div>
        <h1>Input a number to convert</h1>
        <input type="number" id="input" placeholder="0" inputmode="numeric">
        <button onclick="convert()">Convert</button>
        <hr class="divider">
        <div class="output-label">Binary</div>
        <p id="output"></p>
    </div>

    <script>
        function convert() {
            const input = document.getElementById("input");
            const output = document.getElementById("output");
            const parsed = parseInt(input.value);
            if (isNaN(parsed)) {
                output.innerHTML = "—";
                return;
            }
            const binary = parsed.toString(2);
            output.innerHTML = binary;
        }

        // Allow Enter key to trigger conversion on mobile keyboards
        document.getElementById("input").addEventListener("keydown", function(e) {
            if (e.key === "Enter") convert();
        });
    </script>
</body>
</html>
